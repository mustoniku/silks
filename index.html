<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Membuka Aplikasi SILIKS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #152033;
      background: linear-gradient(135deg, #f7fff9 0%, #e7f7ed 45%, #d6efe0 100%);
    }
    main {
      width: min(520px, 100%);
      padding: 30px;
      border-radius: 12px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 18px 44px rgba(15,42,26,.12);
      text-align: center;
    }
    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(145deg, #0f7a3b, #07502b);
      font-size: 34px;
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 28px; }
    p { margin: 12px 0 0; color: #607068; line-height: 1.6; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 22px;
      padding: 10px 18px;
      border-radius: 8px;
      color: #fff;
      background: #0f7a3b;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">S</div>
    <h1>Membuka Aplikasi SILIKS</h1>
    <p>Klik tombol berikut untuk membuka aplikasi resmi SILIKS.</p>
    <a href="https://script.google.com/macros/s/AKfycbzq0X6FiYJT6O8GjXNHFnhVdti9IiklSFqYxFtXy3fkv11zZ2E3Lf7uoB_jm4gj-qyT/exec" rel="noopener">Buka SILIKS</a>
  </main>
</body>
</html>
