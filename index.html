<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aplikasi Web Saya</title>
  <style>
    /* Menghilangkan margin dan scrollbar bawaan browser */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    /* Membuat iFrame memenuhi seluruh layar tanpa border */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbyhUqbw_kUspMo6cY0U_GINlQ7YFhS208cF5A5ig7_1lv-_LDFL1mbbDnVWTma3s3tMsQ/exec"></iframe>

</body>
</html>
