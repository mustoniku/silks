<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aplikasi SILIKS</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #eefaf3;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      opacity: 0;
      transition: opacity .25s ease;
      background: #fff;
    }
    iframe.ready { opacity: 1; }
    .splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 80%, rgba(1, 99, 53, .16), transparent 28%),
        radial-gradient(circle at 90% 20%, rgba(14, 165, 233, .18), transparent 26%),
        linear-gradient(135deg, #effdf5 0%, #e7f8ff 55%, #fffdf2 100%);
      color: #0f172a;
      text-align: center;
      transition: opacity .25s ease, visibility .25s ease;
    }
    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .card {
      width: min(680px, 92vw);
      border-radius: 28px;
      padding: clamp(28px, 5vw, 56px);
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(1,99,53,.12);
      box-shadow: 0 24px 70px rgba(15,23,42,.14);
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 88px;
      height: 88px;
      margin: 0 auto 22px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: white;
      box-shadow: 0 14px 38px rgba(1,99,53,.16);
      border: 1px solid #d8f3e5;
    }
    .logo img {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }
    .kicker {
      margin: 0 0 10px;
      color: #007a47;
      font-weight: 900;
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: .2px;
    }
    h1 {
      margin: 0;
      font-size: clamp(48px, 10vw, 86px);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -1px;
    }
    .subtitle {
      margin: 22px auto 0;
      color: #334155;
      font-size: clamp(20px, 4vw, 38px);
      line-height: 1.18;
      font-weight: 800;
      max-width: 620px;
    }
    .status {
      margin: 34px auto 0;
      width: fit-content;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border-radius: 999px;
      padding: 13px 22px;
      background: #ddf4e9;
      color: #016335;
      font-size: clamp(16px, 3vw, 24px);
      font-weight: 900;
    }
    .spinner {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 5px solid rgba(1,99,53,.18);
      border-top-color: #016335;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }
    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 14px;
      z-index: 11;
      padding: 0 16px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) {
      .card { padding: 30px 22px; border-radius: 24px; }
      .logo { width: 76px; height: 76px; }
      .logo img { width: 58px; height: 58px; }
      .status { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div id="splash" class="splash" role="status" aria-live="polite">
    <main class="card">
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Seal_of_the_Ministry_of_Religious_Affairs_of_the_Republic_of_Indonesia.svg" alt="Logo Kemenag">
      </div>
      <p class="kicker">Mohon Menunggu Sebentar...</p>
      <h1>Aplikasi SILIKS</h1>
      <p class="subtitle">Sistem Informasi Layanan Integrasi Kesehatan Sekolah</p>
      <div class="status">
        <span class="spinner" aria-hidden="true"></span>
        <span>Sedang menyiapkan halaman login</span>
      </div>
    </main>
    <div class="footer">&copy; 2026 Kantor Kementerian Agama Kabupaten Tegal &bull; Layanan Integrasi Kesehatan Sekolah (UKS)</div>
  </div>

  <iframe
    id="siliksFrame"
    src="https://script.google.com/macros/s/AKfycbzq0X6FiYJT6O8GjXNHFnhVdti9IiklSFqYxFtXy3fkv11zZ2E3Lf7uoB_jm4gj-qyT/exec"
    title="Aplikasi SILIKS"
    loading="eager"
  ></iframe>

  <script>
    const frame = document.getElementById('siliksFrame');
    const splash = document.getElementById('splash');
    frame.addEventListener('load', () => {
      frame.classList.add('ready');
      setTimeout(() => splash.classList.add('hidden'), 300);
    });
  </script>
</body>
</html>
