<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Membuka Aplikasi Capkin 2026</title>
  <script>
    const TARGET_URL = 'GANTI_DENGAN_URL_WEB_APP_EXEC';

    function isValidTarget(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(?:[?#].*)?$/.test(url);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const button = document.getElementById('openApp');
      const warning = document.getElementById('warning');

      if (!isValidTarget(TARGET_URL)) {
        warning.hidden = false;
        button.hidden = true;
        return;
      }

      button.href = TARGET_URL;
      window.location.replace(TARGET_URL);
    });
  </script>
  <style>
    :root {
      color-scheme: light;
      --green: #0f7a3b;
      --green-dark: #07502b;
      --gold: #f6c343;
      --ink: #152033;
      --muted: #607068;
      --bg: #eef8f1;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(246,195,67,.18), transparent 28%),
        linear-gradient(135deg, #f7fff9 0%, #e8f7ed 42%, #d9f0e2 100%);
    }

    main {
      width: min(520px, 100%);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 12px;
      padding: 30px;
      background: rgba(255,255,255,.86);
      box-shadow: 0 18px 44px rgba(15, 42, 26, .12);
      text-align: center;
    }

    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      box-shadow: 0 12px 26px rgba(15,122,59,.24);
      font-size: 34px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 22px;
      padding: 10px 18px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      text-decoration: none;
      font-weight: 800;
    }

    a:hover { background: var(--green-dark); }

    .warning {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 10px;
      color: #7a2e0e;
      background: #fff3df;
      border: 1px solid #ffd49a;
      text-align: left;
      font-weight: 700;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(15,122,59,.1);
      color: var(--green-dark);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">K</div>
    <h1>Membuka Aplikasi Capkin 2026</h1>
    <p>Jika halaman tidak berpindah otomatis, klik tombol berikut.</p>
    <p id="warning" class="warning" hidden>Target Web App belum diisi. Buka file <code>index.html</code>, lalu ganti <code>GANTI_DENGAN_URL_WEB_APP_EXEC</code> dengan URL Apps Script yang berakhiran <code>/exec</code>.</p>
    <a id="openApp" href="#">Buka Aplikasi</a>
  </main>
</body>
</html>
